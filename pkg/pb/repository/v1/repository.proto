syntax = "proto3";

package forklore.repository.v1;

option go_package = "github.com/Anabol1ks/Forklore/pkg/pb/repository/v1;repositoryv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "validate/validate.proto";
import "common/v1/common.proto";

service RepositoryService {
  rpc CreateRepository(CreateRepositoryRequest) returns (CreateRepositoryResponse);
  rpc GetRepositoryById(GetRepositoryByIdRequest) returns (GetRepositoryResponse);
  rpc GetRepositoryBySlug(GetRepositoryBySlugRequest) returns (GetRepositoryResponse);

  rpc UpdateRepository(UpdateRepositoryRequest) returns (UpdateRepositoryResponse);
  rpc DeleteRepository(DeleteRepositoryRequest) returns (google.protobuf.Empty);

  rpc ForkRepository(ForkRepositoryRequest) returns (ForkRepositoryResponse);

  rpc ListMyRepositories(ListMyRepositoriesRequest) returns (ListRepositoriesResponse);
  rpc ListUserRepositories(ListUserRepositoriesRequest) returns (ListRepositoriesResponse);
  rpc ListForks(ListForksRequest) returns (ListRepositoriesResponse);

  rpc GetRepositoryStarState(GetRepositoryStarStateRequest) returns (RepositoryStarStateResponse);
  rpc ToggleRepositoryStar(ToggleRepositoryStarRequest) returns (RepositoryStarStateResponse);
  rpc ListMyStarredRepositories(ListMyStarredRepositoriesRequest) returns (ListRepositoriesResponse);

  rpc ListRepositoryTags(google.protobuf.Empty) returns (ListRepositoryTagsResponse);
}

message RepositoryTag {
  common.v1.UUID tag_id = 1 [(validate.rules).message = {required: true}];
  string name = 2 [
    (validate.rules).string = {
      min_len: 2,
      max_len: 64
    }
  ];
  string slug = 3 [
    (validate.rules).string = {
      min_len: 2,
      max_len: 64,
      pattern: "^[a-z0-9](?:[a-z0-9-]{0,62}[a-z0-9])?$"
    }
  ];
  string description = 4 [
    (validate.rules).string = {
      max_len: 1000
    }
  ];
  bool is_active = 5;
  google.protobuf.Timestamp created_at = 6 [(validate.rules).timestamp = {required: true}];
  google.protobuf.Timestamp updated_at = 7;
}

message Repository {
  common.v1.UUID repo_id = 1 [(validate.rules).message = {required: true}];
  common.v1.UUID owner_id = 2 [(validate.rules).message = {required: true}];
  string owner_username = 14 [(validate.rules).string = {max_len: 32}];
  common.v1.UUID tag_id = 3 [(validate.rules).message = {required: true}];

  string name = 4 [
    (validate.rules).string = {
      min_len: 3,
      max_len: 100
    }
  ];

  string slug = 5 [
    (validate.rules).string = {
      min_len: 3,
      max_len: 64,
      pattern: "^[a-z0-9](?:[a-z0-9-]{1,62}[a-z0-9])?$"
    }
  ];

  string description = 6 [
    (validate.rules).string = {
      max_len: 2000
    }
  ];

  common.v1.RepositoryVisibility visibility = 7;
  common.v1.RepositoryType type = 8;

  RepositoryTag tag = 9;
  common.v1.UUID parent_repo_id = 10;

  google.protobuf.Timestamp created_at = 11 [(validate.rules).timestamp = {required: true}];
  google.protobuf.Timestamp updated_at = 12;
  google.protobuf.Timestamp deleted_at = 13;
}

message CreateRepositoryRequest {
  string name = 1 [
    (validate.rules).string = {
      min_len: 3,
      max_len: 100
    }
  ];

  string slug = 2 [
    (validate.rules).string = {
      max_len: 64
    }
  ];

  string description = 3 [
    (validate.rules).string = {
      max_len: 2000
    }
  ];

  common.v1.UUID tag_id = 4 [(validate.rules).message = {required: true}];
  common.v1.RepositoryVisibility visibility = 5;
  common.v1.RepositoryType type = 6;
}

message CreateRepositoryResponse {
  Repository repository = 1;
}

message GetRepositoryByIdRequest {
  common.v1.UUID repo_id = 1 [(validate.rules).message = {required: true}];
}

message GetRepositoryBySlugRequest {
  common.v1.UUID owner_id = 1 [(validate.rules).message = {required: true}];

  string slug = 2 [
    (validate.rules).string = {
      min_len: 3,
      max_len: 64,
      pattern: "^[a-z0-9](?:[a-z0-9-]{1,62}[a-z0-9])?$"
    }
  ];
}

message GetRepositoryResponse {
  Repository repository = 1;
}

message UpdateRepositoryRequest {
  common.v1.UUID repo_id = 1 [(validate.rules).message = {required: true}];

  string name = 2 [
    (validate.rules).string = {
      min_len: 3,
      max_len: 100
    }
  ];

  string slug = 3 [
    (validate.rules).string = {
      min_len: 3,
      max_len: 64,
      pattern: "^[a-z0-9](?:[a-z0-9-]{1,62}[a-z0-9])?$"
    }
  ];

  string description = 4 [
    (validate.rules).string = {
      max_len: 2000
    }
  ];

  common.v1.UUID tag_id = 5;
  common.v1.RepositoryVisibility visibility = 6;
  common.v1.RepositoryType type = 7;
}

message UpdateRepositoryResponse {
  Repository repository = 1;
}

message DeleteRepositoryRequest {
  common.v1.UUID repo_id = 1 [(validate.rules).message = {required: true}];
}

message ForkRepositoryRequest {
  common.v1.UUID source_repo_id = 1 [(validate.rules).message = {required: true}];

  string name = 2 [
    (validate.rules).string = {
      max_len: 100
    }
  ];

  string slug = 3 [
    (validate.rules).string = {
      max_len: 64
    }
  ];

  string description = 4 [
    (validate.rules).string = {
      max_len: 2000
    }
  ];

  common.v1.RepositoryVisibility visibility = 5;
}

message ForkRepositoryResponse {
  Repository repository = 1;
}

message ListMyRepositoriesRequest {
  uint32 limit = 1 [(validate.rules).uint32 = {gte: 1, lte: 100}];
  uint32 offset = 2;
}

message ListUserRepositoriesRequest {
  common.v1.UUID owner_id = 1 [(validate.rules).message = {required: true}];
  uint32 limit = 2 [(validate.rules).uint32 = {gte: 1, lte: 100}];
  uint32 offset = 3;
}

message ListForksRequest {
  common.v1.UUID repo_id = 1 [(validate.rules).message = {required: true}];
  uint32 limit = 2 [(validate.rules).uint32 = {gte: 1, lte: 100}];
  uint32 offset = 3;
}

message ListRepositoriesResponse {
  repeated Repository repositories = 1;
  uint64 total = 2;
}

message ListRepositoryTagsResponse {
  repeated RepositoryTag tags = 1;
}

message GetRepositoryStarStateRequest {
  common.v1.UUID repo_id = 1 [(validate.rules).message = {required: true}];
}

message ToggleRepositoryStarRequest {
  common.v1.UUID repo_id = 1 [(validate.rules).message = {required: true}];
}

message ListMyStarredRepositoriesRequest {
  uint32 limit = 1 [(validate.rules).uint32 = {gte: 1, lte: 100}];
  uint32 offset = 2;
}

message RepositoryStarStateResponse {
  common.v1.UUID repo_id = 1;
  bool starred = 2;
  uint64 stars_count = 3;
}