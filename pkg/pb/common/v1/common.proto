syntax = "proto3";

package forklore.common.v1;

option go_package = "github.com/Anabol1ks/Forklore/pkg/pb/common/v1;commonv1";

message UUID { string value = 1; }

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_USER = 1;
  USER_ROLE_ADMIN = 2;
}

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_BLOCKED = 2;
  USER_STATUS_DELETED = 3;
}

enum RepositoryVisibility {
  REPOSITORY_VISIBILITY_UNSPECIFIED = 0;
  REPOSITORY_VISIBILITY_PUBLIC = 1;
  REPOSITORY_VISIBILITY_PRIVATE = 2;
}

enum RepositoryType {
  REPOSITORY_TYPE_UNSPECIFIED = 0;
  REPOSITORY_TYPE_ARTICLE = 1;
  REPOSITORY_TYPE_NOTES = 2;
  REPOSITORY_TYPE_MIXED = 3;
}

enum DocumentFormat {
  DOCUMENT_FORMAT_UNSPECIFIED = 0;
  DOCUMENT_FORMAT_MARKDOWN = 1;
}

enum SearchEntityType {
  SEARCH_ENTITY_TYPE_UNSPECIFIED = 0;
  SEARCH_ENTITY_TYPE_REPOSITORY = 1;
  SEARCH_ENTITY_TYPE_DOCUMENT = 2;
  SEARCH_ENTITY_TYPE_FILE = 3;
}

enum SearchEventType {
  SEARCH_EVENT_TYPE_UNSPECIFIED = 0;
  SEARCH_EVENT_TYPE_REPOSITORY_UPSERTED = 1;
  SEARCH_EVENT_TYPE_REPOSITORY_DELETED = 2;
  SEARCH_EVENT_TYPE_DOCUMENT_UPSERTED = 3;
  SEARCH_EVENT_TYPE_DOCUMENT_DELETED = 4;
  SEARCH_EVENT_TYPE_FILE_UPSERTED = 5;
  SEARCH_EVENT_TYPE_FILE_DELETED = 6;
}