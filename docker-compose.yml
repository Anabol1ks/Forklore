services:
  auth-db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_AUTH_USER}
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD}
      POSTGRES_DB: ${DB_AUTH_NAME}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_AUTH_USER} -d ${DB_AUTH_NAME} -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - forklore-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    env_file: .env
    environment:
      # Внутри docker-сети хост БД должен быть именем сервиса, а не localhost.
      DB_AUTH_HOST: auth-db
      KAFKA_BROKERS: kafka:9092
    depends_on:
      auth-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - forklore-network

  repo-db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_REPO_USER}
      POSTGRES_PASSWORD: ${DB_REPO_PASSWORD}
      POSTGRES_DB: ${DB_REPO_NAME} 
    volumes:
      - repo_db_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_REPO_USER} -d ${DB_REPO_NAME} -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - forklore-network
  repository-service:
    build:
      context: .
      dockerfile: repository-service/Dockerfile
    env_file: .env
    environment:
      # Внутри docker-сети хост БД должен быть именем сервиса, а не localhost.
      DB_REPO_HOST: repo-db
      # Внутри docker-сети используется внутренний порт контейнера БД.
      DB_REPO_PORT: "5432"
      KAFKA_BROKERS: kafka:9092
    depends_on:
      repo-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks:
      - forklore-network
  content-db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_CONTENT_USER}
      POSTGRES_PASSWORD: ${DB_CONTENT_PASSWORD}
      POSTGRES_DB: ${DB_CONTENT_NAME}
    volumes:
      - content_db_data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_CONTENT_USER} -d ${DB_CONTENT_NAME} -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - forklore-network

  content-service:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    env_file: .env
    environment:
      # Внутри docker-сети хост БД должен быть именем сервиса, а не localhost.
      DB_CONTENT_HOST: content-db
      # Внутри docker-сети используется внутренний порт контейнера БД.
      DB_CONTENT_PORT: "5432"
      # Для межсервисного вызова в docker-сети нужен адрес сервиса, не localhost.
      REPOSITORY_SERVICE_ADDR: repository-service:8082
      KAFKA_BROKERS: kafka:9092
    depends_on:
      content-db:
        condition: service_healthy
      repository-service:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    networks:
      - forklore-network
  
  search-db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_SEARCH_USER}
      POSTGRES_PASSWORD: ${DB_SEARCH_PASSWORD}
      POSTGRES_DB: ${DB_SEARCH_NAME}
    volumes:
      - search_db_data:/var/lib/postgresql/data
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SEARCH_USER} -d ${DB_SEARCH_NAME} -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - forklore-network
    
  
  search-service:
    build:
      context: .
      dockerfile: search-service/Dockerfile
    env_file: .env
    environment:
      # Внутри docker-сети хост БД должен быть именем сервиса, а не localhost.
      DB_SEARCH_HOST: search-db
      # Внутри docker-сети используется внутренний порт контейнера БД.
      DB_SEARCH_PORT: "5432"
      # Для межсервисного вызова в docker-сети нужен адрес сервиса, не localhost.
      KAFKA_BROKERS: kafka:9092
    depends_on:
      search-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"
    networks:
      - forklore-network


  profile-db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_PROFILE_USER}
      POSTGRES_PASSWORD: ${DB_PROFILE_PASSWORD}
      POSTGRES_DB: ${DB_PROFILE_NAME}
    volumes:
      - profile_db_data:/var/lib/postgresql/data
    ports:
      - "5448:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_PROFILE_USER} -d ${DB_PROFILE_NAME} -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - forklore-network
  profile-service:
    build:
      context: .
      dockerfile: profile-service/Dockerfile
    env_file: .env
    environment:
      DB_PROFILE_HOST: profile-db
      DB_PROFILE_PORT: "5432"
      KAFKA_BROKERS: kafka:9092
    depends_on:
      profile-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"
    networks:
      - forklore-network

  ranking-db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_RANKING_USER}
      POSTGRES_PASSWORD: ${DB_RANKING_PASSWORD}
      POSTGRES_DB: ${DB_RANKING_NAME}
    volumes:
      - ranking_db_data:/var/lib/postgresql/data
    ports:
      - "5450:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_RANKING_USER} -d ${DB_RANKING_NAME} -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - forklore-network

  ranking-service:
    build:
      context: .
      dockerfile: ranking-service/Dockerfile
    env_file: .env
    environment:
      DB_RANKING_HOST: ranking-db
      DB_RANKING_PORT: "5432"
      KAFKA_BROKERS: kafka:9092
    depends_on:
      ranking-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8087:8087"
    networks:
      - forklore-network

  study-service:
    build:
      context: .
      dockerfile: study-service/Dockerfile
    env_file: .env
    environment:
      STUDY_SERVICE_PORT: "8086"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8086/healthz', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "8086:8086"
    networks:
      - forklore-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    env_file: .env
    environment:
      AUTH_SERVICE_ADDR: auth-service:8081
      REPOSITORY_SERVICE_ADDR: repository-service:8082
      CONTENT_SERVICE_ADDR: content-service:8083
      SEARCH_SERVICE_ADDR: search-service:8084
      PROFILE_SERVICE_ADDR: profile-service:8085
      RANKING_SERVICE_ADDR: ranking-service:8087
      STUDY_SERVICE_URL: http://study-service:8086
      GATEWAY_PORT: "8080"
    depends_on:
      auth-service:
        condition: service_started
      repository-service:
        condition: service_started
      content-service:
        condition: service_started
      search-service:
        condition: service_started
      profile-service:
        condition: service_started
      ranking-service:
        condition: service_started
      study-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - forklore-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      NODE_ENV: production
    depends_on:
      api-gateway:
        condition: service_started
    expose:
      - "3000"
    networks:
      - forklore-network

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      api-gateway:
        condition: service_started
    networks:
      - forklore-network

  kafka:
    image: apache/kafka:4.1.2
    env_file: .env
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: ${KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 45s
    networks:
      - forklore-network

volumes:
  auth_db_data:
  repo_db_data:
  content_db_data:
  search_db_data:
  profile_db_data:
  ranking_db_data:
  kafka_data:
  caddy_data:
  caddy_config:

networks:
  forklore-network:
    driver: bridge
