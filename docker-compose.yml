services:
  auth-db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_AUTH_USER}
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD}
      POSTGRES_DB: ${DB_AUTH_NAME}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_AUTH_USER} -d ${DB_AUTH_NAME} -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - forklore-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    env_file: .env
    environment:
      # Внутри docker-сети хост БД должен быть именем сервиса, а не localhost.
      DB_AUTH_HOST: auth-db
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - forklore-network

  repo-db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_REPO_USER}
      POSTGRES_PASSWORD: ${DB_REPO_PASSWORD}
      POSTGRES_DB: ${DB_REPO_NAME} 
    volumes:
      - repo_db_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_REPO_USER} -d ${DB_REPO_NAME} -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - forklore-network
  repository-service:
    build:
      context: .
      dockerfile: repository-service/Dockerfile
    env_file: .env
    environment:
      # Внутри docker-сети хост БД должен быть именем сервиса, а не localhost.
      DB_REPO_HOST: repo-db
      # Внутри docker-сети используется внутренний порт контейнера БД.
      DB_REPO_PORT: "5432"
      KAFKA_BROKERS: kafka:9092
    depends_on:
      repo-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks:
      - forklore-network
  content-db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_CONTENT_USER}
      POSTGRES_PASSWORD: ${DB_CONTENT_PASSWORD}
      POSTGRES_DB: ${DB_CONTENT_NAME}
    volumes:
      - content_db_data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_CONTENT_USER} -d ${DB_CONTENT_NAME} -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - forklore-network

  content-service:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    env_file: .env
    environment:
      # Внутри docker-сети хост БД должен быть именем сервиса, а не localhost.
      DB_CONTENT_HOST: content-db
      # Внутри docker-сети используется внутренний порт контейнера БД.
      DB_CONTENT_PORT: "5432"
      # Для межсервисного вызова в docker-сети нужен адрес сервиса, не localhost.
      REPOSITORY_SERVICE_ADDR: repository-service:8082
      KAFKA_BROKERS: kafka:9092
    depends_on:
      content-db:
        condition: service_healthy
      repository-service:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    networks:
      - forklore-network
  
  search-db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_SEARCH_USER}
      POSTGRES_PASSWORD: ${DB_SEARCH_PASSWORD}
      POSTGRES_DB: ${DB_SEARCH_NAME}
    volumes:
      - search_db_data:/var/lib/postgresql/data
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SEARCH_USER} -d ${DB_SEARCH_NAME} -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - forklore-network

  kafka:
    image: apache/kafka:4.1.2
    env_file: .env
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: ${KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 45s
    networks:
      - forklore-network

volumes:
  auth_db_data:
  repo_db_data:
  content_db_data:
  search_db_data:
  kafka_data:

networks:
  forklore-network:
    driver: bridge